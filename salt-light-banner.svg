<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7200 2400" width="7200" height="2400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5EDE0"/>
      <stop offset="40%" stop-color="#FFFAF3"/>
      <stop offset="60%" stop-color="#FFFAF3"/>
      <stop offset="100%" stop-color="#F5EDE0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C67D5B"/>
      <stop offset="50%" stop-color="#D4956E"/>
      <stop offset="100%" stop-color="#C67D5B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="7200" height="2400" fill="url(#bgGrad)"/>

  <!-- Top + bottom border bars -->
  <rect x="0" y="0" width="7200" height="22" fill="url(#accentGrad)"/>
  <rect x="0" y="2378" width="7200" height="22" fill="url(#accentGrad)"/>

  <!-- Decorative inner rules -->
  <line x1="0" y1="55" x2="7200" y2="55" stroke="#E8DDD0" stroke-width="2.5"/>
  <line x1="0" y1="2345" x2="7200" y2="2345" stroke="#E8DDD0" stroke-width="2.5"/>

  <!-- LEFT SIDE — Sun icon -->
  <g transform="translate(700, 1200)">
    <g stroke="#C67D5B" stroke-width="7" opacity="0.5">
      <line x1="0" y1="-280" x2="0" y2="-380"/>
      <line x1="198" y1="-198" x2="269" y2="-269"/>
      <line x1="280" y1="0" x2="380" y2="0"/>
      <line x1="198" y1="198" x2="269" y2="269"/>
      <line x1="0" y1="280" x2="0" y2="380"/>
      <line x1="-198" y1="198" x2="-269" y2="269"/>
      <line x1="-280" y1="0" x2="-380" y2="0"/>
      <line x1="-198" y1="-198" x2="-269" y2="-269"/>
    </g>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#C67D5B" stroke-width="7" opacity="0.4"/>
    <circle cx="0" cy="0" r="140" fill="#C67D5B" opacity="0.08"/>
    <circle cx="0" cy="0" r="42" fill="#C67D5B" opacity="0.6"/>
  </g>

  <!-- CENTER — Main text block -->
  <!-- SALT & LIGHT -->
  <text x="3600" y="980"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="680"
    font-weight="700"
    fill="#5C4A3A"
    text-anchor="middle"
    letter-spacing="40">SALT &amp; LIGHT</text>

  <!-- Thin rule under title -->
  <line x1="1800" y1="1080" x2="5400" y2="1080" stroke="#C67D5B" stroke-width="4" opacity="0.6"/>

  <!-- Tagline -->
  <text x="3600" y="1380"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="200"
    font-weight="400"
    fill="#3D2E22"
    text-anchor="middle"
    letter-spacing="10"
    font-style="italic">Find your people again.</text>

  <!-- Ornament dots under tagline -->
  <g transform="translate(3600, 1540)">
    <circle cx="-30" cy="0" r="8" fill="#C67D5B" opacity="0.4"/>
    <circle cx="0" cy="0" r="12" fill="#C67D5B" opacity="0.7"/>
    <circle cx="30" cy="0" r="8" fill="#C67D5B" opacity="0.4"/>
  </g>

  <!-- Website + location -->
  <text x="3600" y="1780"
    font-family="Georgia, serif"
    font-size="120"
    fill="#C67D5B"
    text-anchor="middle"
    letter-spacing="8">saltandlight.social</text>

  <text x="3600" y="1960"
    font-family="Georgia, serif"
    font-size="95"
    fill="#A08878"
    text-anchor="middle"
    letter-spacing="14">ORANGE COUNTY, CA</text>

  <!-- RIGHT SIDE — value props -->
  <g transform="translate(5900, 900)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="95" fill="#5C4A3A" font-weight="600" letter-spacing="3">🌱 Faith-Rooted</text>
    <text x="0" y="110" font-family="Georgia, serif" font-size="75" fill="#7A6555" font-style="italic">Grounded in love</text>
  </g>

  <line x1="5600" y1="1090" x2="6900" y2="1090" stroke="#E8DDD0" stroke-width="2"/>

  <g transform="translate(5900, 1180)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="95" fill="#5C4A3A" font-weight="600" letter-spacing="3">🤝 Inclusive</text>
    <text x="0" y="110" font-family="Georgia, serif" font-size="75" fill="#7A6555" font-style="italic">Good hearts welcome</text>
  </g>

  <line x1="5600" y1="1370" x2="6900" y2="1370" stroke="#E8DDD0" stroke-width="2"/>

  <g transform="translate(5900, 1460)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="95" fill="#5C4A3A" font-weight="600" letter-spacing="3">✨ Community</text>
    <text x="0" y="110" font-family="Georgia, serif" font-size="75" fill="#7A6555" font-style="italic">Real humans, real life</text>
  </g>

</svg>
