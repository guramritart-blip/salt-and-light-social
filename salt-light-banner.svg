<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7200 2400" width="7200" height="2400">
  <defs>
    <!-- Watercolor soft blur filters -->
    <filter id="wc-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="wc-med" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <filter id="wc-large" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="130"/>
    </filter>

    <!-- Google Font via foreignObject not reliable — use style embed -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&amp;display=swap');
      .title { font-family: 'Cormorant Garamond', Georgia, serif; }
      .sub { font-family: 'Cormorant Garamond', Georgia, serif; }
    </style>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="7200" height="2400" fill="#F0E7D3"/>

  <!-- ===== WATERCOLOR BLOBS ===== -->

  <!-- TOP LEFT — Sage green, large organic -->
  <ellipse cx="300" cy="200" rx="1100" ry="900" fill="#7A9C78" opacity="0.55" filter="url(#wc-large)"/>
  <ellipse cx="600" cy="600" rx="700" ry="700" fill="#6A8F6A" opacity="0.5" filter="url(#wc-med)"/>
  <ellipse cx="100" cy="900" rx="600" ry="800" fill="#84A882" opacity="0.45" filter="url(#wc-med)"/>
  <!-- Wispy top-center green -->
  <ellipse cx="2000" cy="100" rx="900" ry="400" fill="#8FAC8C" opacity="0.35" filter="url(#wc-large)"/>

  <!-- TOP RIGHT — Terracotta/rust -->
  <ellipse cx="6900" cy="300" rx="900" ry="800" fill="#C47A5C" opacity="0.55" filter="url(#wc-large)"/>
  <ellipse cx="7100" cy="800" rx="600" ry="700" fill="#BF7055" opacity="0.5" filter="url(#wc-med)"/>
  <ellipse cx="6500" cy="150" rx="700" ry="400" fill="#CC8866" opacity="0.4" filter="url(#wc-med)"/>

  <!-- BOTTOM — Teal, large sweeping -->
  <ellipse cx="4800" cy="2300" rx="2800" ry="700" fill="#4A8282" opacity="0.65" filter="url(#wc-large)"/>
  <ellipse cx="5500" cy="2100" rx="1800" ry="600" fill="#3D7575" opacity="0.55" filter="url(#wc-med)"/>
  <ellipse cx="3200" cy="2350" rx="1400" ry="500" fill="#558A8A" opacity="0.4" filter="url(#wc-large)"/>

  <!-- BOTTOM LEFT — Muted olive/taupe -->
  <ellipse cx="800" cy="2200" rx="900" ry="600" fill="#8C9878" opacity="0.45" filter="url(#wc-large)"/>
  <ellipse cx="400" cy="2350" rx="600" ry="400" fill="#7A8A68" opacity="0.4" filter="url(#wc-med)"/>

  <!-- Small accent blob mid-right -->
  <ellipse cx="6800" cy="1600" rx="500" ry="400" fill="#C08060" opacity="0.35" filter="url(#wc-large)"/>

  <!-- ===== TEXT ===== -->

  <!-- "Salt & Light" — elegant mixed-case serif, dark forest green -->
  <text
    x="3600" y="1230"
    class="title"
    font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
    font-size="700"
    font-weight="400"
    font-style="italic"
    fill="#2D4E3C"
    text-anchor="middle"
    letter-spacing="-5">Salt &amp; Light</text>

  <!-- Tagline — small caps, spaced out -->
  <text
    x="3600" y="1530"
    class="sub"
    font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
    font-size="130"
    font-weight="600"
    fill="#2D4E3C"
    text-anchor="middle"
    letter-spacing="22">FIND YOUR PEOPLE AGAIN</text>

</svg>
