<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7200 2400" width="7200" height="2400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8D4C4"/>
      <stop offset="50%" stop-color="#D4DFD0"/>
      <stop offset="100%" stop-color="#C8D4C4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="7200" height="2400" fill="url(#bg)"/>

  <!-- Top border -->
  <rect x="0" y="0" width="7200" height="22" fill="#C67D5B"/>
  <!-- Bottom border -->
  <rect x="0" y="2378" width="7200" height="22" fill="#C67D5B"/>

  <!-- Inner rules -->
  <line x1="140" y1="66" x2="7060" y2="66" stroke="#B8C8B4" stroke-width="2"/>
  <line x1="140" y1="2334" x2="7060" y2="2334" stroke="#B8C8B4" stroke-width="2"/>

  <!-- SALT & LIGHT — centered -->
  <text
    x="3600" y="1080"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="640"
    font-weight="700"
    fill="#5C4A3A"
    text-anchor="middle"
    letter-spacing="28">SALT &amp; LIGHT</text>

  <!-- Divider line -->
  <line x1="1900" y1="1190" x2="5300" y2="1190" stroke="#C67D5B" stroke-width="5" opacity="0.6"/>

  <!-- Tagline: "Find your people again." with people in terracotta -->
  <text
    x="3600" y="1390"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="168"
    font-weight="400"
    font-style="italic"
    fill="#3D2E22"
    text-anchor="middle"
    letter-spacing="6">Find your <tspan fill="#C67D5B">people</tspan> again.</text>

  <!-- Dot ornament -->
  <circle cx="3556" cy="1480" r="9" fill="#C67D5B" opacity="0.45"/>
  <circle cx="3600" cy="1480" r="13" fill="#C67D5B" opacity="0.65"/>
  <circle cx="3644" cy="1480" r="9" fill="#C67D5B" opacity="0.45"/>

  <!-- Website -->
  <text
    x="3600" y="1640"
    font-family="Georgia, serif"
    font-size="104"
    fill="#C67D5B"
    text-anchor="middle"
    letter-spacing="10">saltandlight.social</text>

  <!-- Location -->
  <text
    x="3600" y="1770"
    font-family="Georgia, serif"
    font-size="88"
    fill="#5C4A3A"
    text-anchor="middle"
    letter-spacing="16"
    opacity="0.7">ORANGE COUNTY, CA</text>

</svg>
