<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7200 2400" width="7200" height="2400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8D4BE"/>
      <stop offset="30%" stop-color="#D4DCCA"/>
      <stop offset="50%" stop-color="#DCE4D2"/>
      <stop offset="70%" stop-color="#D4DCCA"/>
      <stop offset="100%" stop-color="#C8D4BE"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EDE5D8"/>
      <stop offset="100%" stop-color="#E8DDD0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="7200" height="2400" fill="url(#bgGrad)"/>

  <!-- Subtle vignette edges -->
  <rect x="0" y="0" width="7200" height="2400" fill="url(#bgGrad)" opacity="0.3"/>

  <!-- Top + bottom border bars — terracotta -->
  <rect x="0" y="0" width="7200" height="18" fill="#C4704A"/>
  <rect x="0" y="2382" width="7200" height="18" fill="#C4704A"/>

  <!-- ORANGE COUNTY, CA pill — left side -->
  <rect x="260" y="1060" width="820" height="110" rx="55" fill="url(#pillGrad)"/>
  <text x="670" y="1130"
    font-family="Georgia, serif"
    font-size="68"
    fill="#C4704A"
    text-anchor="middle"
    letter-spacing="10"
    font-weight="600">ORANGE COUNTY, CA</text>

  <!-- ORANGE COUNTY, CA pill — right side -->
  <rect x="6120" y="1060" width="820" height="110" rx="55" fill="url(#pillGrad)"/>
  <text x="6530" y="1130"
    font-family="Georgia, serif"
    font-size="68"
    fill="#C4704A"
    text-anchor="middle"
    letter-spacing="10"
    font-weight="600">ORANGE COUNTY, CA</text>

  <!-- SALT & LIGHT — main title, centered -->
  <!-- "SALT &" in dark brown -->
  <text x="3600" y="1080"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="620"
    font-weight="700"
    fill="#2D1E0F"
    text-anchor="middle"
    letter-spacing="30">SALT &amp;</text>

  <!-- "LIGHT" — split color like website: dark + terracotta -->
  <!-- "LI" dark, "GHT" terracotta — gives that "People" accent effect -->
  <text x="3600" y="1760"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="620"
    font-weight="700"
    fill="#2D1E0F"
    text-anchor="middle"
    letter-spacing="30">LI<tspan fill="#C4704A">GHT</tspan></text>

  <!-- Tagline -->
  <text x="3600" y="2060"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="168"
    font-weight="400"
    fill="#3D2E22"
    text-anchor="middle"
    letter-spacing="10"
    font-style="italic">Find your people again.</text>

  <!-- Website — subtle bottom center -->
  <text x="3600" y="2280"
    font-family="Georgia, serif"
    font-size="88"
    fill="#5C4A3A"
    text-anchor="middle"
    letter-spacing="8"
    opacity="0.7">saltandlight.social</text>

</svg>
