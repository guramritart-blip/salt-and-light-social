<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 7200 2400" width="7200" height="2400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BEC9B4"/>
      <stop offset="50%" stop-color="#D4DCCA"/>
      <stop offset="100%" stop-color="#BEC9B4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="7200" height="2400" fill="url(#bg)"/>

  <!-- Top border -->
  <rect x="0" y="0" width="7200" height="24" fill="#C4704A"/>
  <!-- Bottom border -->
  <rect x="0" y="2376" width="7200" height="24" fill="#C4704A"/>

  <!-- Inner rules -->
  <line x1="120" y1="70" x2="7080" y2="70" stroke="#A8B49E" stroke-width="2"/>
  <line x1="120" y1="2330" x2="7080" y2="2330" stroke="#A8B49E" stroke-width="2"/>

  <!-- SALT & LIGHT — vertically centered block -->
  <!-- Content block center: y=1200, total block height ~1100px, so top at ~650 -->
  <!-- Title baseline at y=1100, cap-height 467px, so top of text at 633 ✓ -->

  <text
    x="3600" y="1100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="640"
    font-weight="700"
    fill="#2D1E0F"
    text-anchor="middle"
    letter-spacing="28">SALT &amp; LIGHT</text>

  <!-- Divider -->
  <line x1="1800" y1="1210" x2="5400" y2="1210" stroke="#C4704A" stroke-width="5" opacity="0.65"/>

  <!-- Tagline — baseline at 1210+80+120=1410 -->
  <text
    x="3600" y="1410"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="168"
    font-weight="400"
    font-style="italic"
    fill="#3D2614"
    text-anchor="middle"
    letter-spacing="8">Find your people again.</text>

  <!-- Dot ornament at y=1500 -->
  <circle cx="3556" cy="1500" r="9" fill="#C4704A" opacity="0.5"/>
  <circle cx="3600" cy="1500" r="13" fill="#C4704A" opacity="0.7"/>
  <circle cx="3644" cy="1500" r="9" fill="#C4704A" opacity="0.5"/>

  <!-- Website — baseline at 1500+60+76=1636 -->
  <text
    x="3600" y="1636"
    font-family="Georgia, serif"
    font-size="104"
    fill="#C4704A"
    text-anchor="middle"
    letter-spacing="10">saltandlight.social</text>

  <!-- Location — baseline at 1636+40+64=1740 -->
  <text
    x="3600" y="1740"
    font-family="Georgia, serif"
    font-size="88"
    fill="#5C4A3A"
    text-anchor="middle"
    letter-spacing="16"
    opacity="0.75">ORANGE COUNTY, CA</text>

</svg>
