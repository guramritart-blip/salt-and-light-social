<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#5C4A3A"/>

  <!-- Salt crystal / light burst -->
  <g transform="translate(32, 32)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4.5" fill="#C67D5B"/>
    <!-- Light rays -->
    <line x1="0" y1="-9" x2="0" y2="-18" stroke="#FFFAF3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="9" x2="0" y2="18" stroke="#FFFAF3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="-18" y2="0" stroke="#FFFAF3" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="9" y1="0" x2="18" y2="0" stroke="#FFFAF3" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Diagonal rays -->
    <line x1="-6.5" y1="-6.5" x2="-13" y2="-13" stroke="#FFFAF3" stroke-width="2" stroke-linecap="round"/>
    <line x1="6.5" y1="-6.5" x2="13" y2="-13" stroke="#FFFAF3" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6.5" y1="6.5" x2="-13" y2="13" stroke="#FFFAF3" stroke-width="2" stroke-linecap="round"/>
    <line x1="6.5" y1="6.5" x2="13" y2="13" stroke="#FFFAF3" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
