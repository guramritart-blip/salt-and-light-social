<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#5C4A3A"/>

  <!-- Light burst icon only — no text -->
  <g transform="translate(256, 256)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="28" fill="#C67D5B"/>
    <!-- Cardinal rays -->
    <line x1="0" y1="-52" x2="0" y2="-105" stroke="#FFFAF3" stroke-width="13" stroke-linecap="round"/>
    <line x1="0" y1="52" x2="0" y2="105" stroke="#FFFAF3" stroke-width="13" stroke-linecap="round"/>
    <line x1="-52" y1="0" x2="-105" y2="0" stroke="#FFFAF3" stroke-width="13" stroke-linecap="round"/>
    <line x1="52" y1="0" x2="105" y2="0" stroke="#FFFAF3" stroke-width="13" stroke-linecap="round"/>
    <!-- Diagonal rays -->
    <line x1="-37" y1="-37" x2="-74" y2="-74" stroke="#FFFAF3" stroke-width="10" stroke-linecap="round"/>
    <line x1="37" y1="-37" x2="74" y2="-74" stroke="#FFFAF3" stroke-width="10" stroke-linecap="round"/>
    <line x1="-37" y1="37" x2="-74" y2="74" stroke="#FFFAF3" stroke-width="10" stroke-linecap="round"/>
    <line x1="37" y1="37" x2="74" y2="74" stroke="#FFFAF3" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
